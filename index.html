<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santiago | XV Años - Premium 2.0</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b0b0b;color:#fff}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;
background:radial-gradient(circle,#5a4300,#0b0b0b 70%);text-align:center;padding:20px}
.card{max-width:900px;border:1px solid #d4af37;border-radius:24px;padding:40px;background:#141414}
h1{color:#d4af37;font-size:4rem;margin:.2em 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.item{background:#1b1b1b;padding:24px;border-radius:18px}
.label{color:#d4af37;font-weight:bold;letter-spacing:2px}
.btn{display:inline-block;margin-top:18px;padding:12px 24px;border:1px solid #d4af37;border-radius:30px;color:#d4af37;text-decoration:none}
</style>
</head>
<body>
<section class="hero">
<div class="card">
<div style="font-size:3rem">👑</div>
<h1>Santiago</h1>
<p>Celebrando XV Años</p>
<p>Una tarde inolvidable llena de alegría, familia y grandes recuerdos.</p>
<div class="grid">
<div class="item">
<div class="label">⛪ CEREMONIA RELIGIOSA</div>
<h3>Parroquia San José</h3>
<p>2:00 PM</p>
<a class="btn" href="#">Ver Iglesia</a>
</div>
<div class="item">
<div class="label">🎉 RECEPCIÓN</div>
<h3>Neapolis Jardín de Eventos</h3>
<p>3:30 PM</p>
<a class="btn" href="#">Ver Salón</a>
</div>
</div>
</div>
</section>
</body>
</html>
